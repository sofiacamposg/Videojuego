<!DOCTYPE html>
<html>
<head>
    <title>DEV - Level1</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="headerContainer">
        <h1 class="pixelText">G L A D I A T O R</h1>
    </header>

    <main class="layout">
        <canvas id="canvas" width="1000" height="600"></canvas>
    </main>

    <script type="module">
        import { draw, handleMouseMove, handleClick, handleKeyDown, handleKeyUp, setSelectedCharacter } from './scenes/level1Scene.js';
        let oldTime = 0;

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // hardcodeas el personaje que quieres probar
        setSelectedCharacter("Lancero"); // "Guerrero" | "Lancero" | "Pesado"

        canvas.addEventListener("mousemove", (e) => handleMouseMove(e, canvas));
        canvas.addEventListener("click", () => {
            const result = handleClick();
            console.log("clicked:", result);
        });
        document.addEventListener("keydown", handleKeyDown);
        document.addEventListener("keyup", handleKeyUp);

        function loop(newTime) {
            let deltaTime = newTime - oldTime;
            draw(ctx, canvas, deltaTime);
            oldTime = newTime;
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
