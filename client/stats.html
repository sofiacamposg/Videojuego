<!DOCTYPE html>
<html>
<head>
    <title>Global Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container text-center mt-5">

        <h1 class="mb-4"> Global Game Statistics</h1>

        <div class="row">

            <div class="col-md-3">
                <div class="card bg-secondary p-3">
                    <h5>Total Players</h5>
                    <h2 id="players">-</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-secondary p-3">
                    <h5>Total Matches</h5>
                    <h2 id="matches">-</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-success p-3">
                    <h5>Total Wins</h5>
                    <h2 id="wins">-</h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card bg-danger p-3">
                    <h5>Total Losses</h5>
                    <h2 id="losses">-</h2>
                </div>
            </div>

        </div>

    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch("http://localhost:3000/stats");
                const data = await response.json();

                const stats = data[0];

                document.getElementById("players").textContent = stats.total_players;
                document.getElementById("matches").textContent = stats.total_matches;
                document.getElementById("wins").textContent = stats.total_wins;
                document.getElementById("losses").textContent = stats.total_losses;

            } catch (error) {
                console.error("Error loading stats:", error);
            }
        }

        loadStats();
    </script>

</body>
</html>
