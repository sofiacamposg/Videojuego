<!DOCTYPE html>
<!--
    globalStats.html
    Admin-only statistics page showing global game data across all players and matches
    Fetches data from the API and renders it using Chart.js bar and doughnut charts
    Redirects to login if no player session is found in localStorage
-->
<html>
<head>
    <title>Global Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'VT323', monospace;
            background: url('./assets/portadaBase.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* main container panel with glass effect and golden border */
        .panel {
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(1px);
            border: 2px solid #a5861e;
            box-shadow: 
                0 0 5px #a5861e,
                0 0 10px #d4af3750;
            border-radius: 12px;
            padding: 20px;
        }

        /* page title styling */
        .title {
            font-size: 60px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* individual stat cards for the top summary row */
        .stat-card {
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 10px;
            border: 2px solid #837549;
            box-shadow: 0 0 10px #ffc10750;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* table row separator styling */
        .table-custom td {
            border-bottom: 1px solid white;
            padding: 10px;
        }

        /* chart canvas styling with glass effect and golden border */
        canvas {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            border: 2px solid #a5861e;
            box-shadow: 0 0 10px #ffc10750;
            border-radius: 10px;
        }

        /* golden glow effect for all headings */
        h1, h3, h4 {
            color: #a5861e;
            text-shadow: 0 0 10px #a5861e;
        }
    </style>
</head>

<body class="bg-dark text-white">

    <div class="container mt-5 panel">

        <div class="title"> ARENA STATS </div>

        <!-- global summary cards: players, matches, wins, losses -->
        <div class="row text-center mb-4">

            <div class="col-md-3 stat-card">
                <h4>Players</h4>
                <h2 id="players">-</h2>
            </div>

            <div class="col-md-3 stat-card">
                <h4>Matches</h4>
                <h2 id="matches">-</h2>
            </div>

            <div class="col-md-3 stat-card">
                <h4>Victories</h4>
                <h2 id="wins">-</h2>
            </div>

            <div class="col-md-3 stat-card">
                <h4>Defeats</h4>
                <h2 id="losses">-</h2>
            </div>

        </div>

        <!-- extra global stats: best score, average time, average kills -->
        <div class="row text-center mb-5">
            <div class="col-md-4">
                <h4>🏆 Best Score</h4>
                <h2 id="global-best">-</h2>
            </div>
            <div class="col-md-4">
                <h4>⏱ Avg Time</h4>
                <h2 id="global-avg-time">-</h2>
            </div>
            <div class="col-md-4">
                <h4>💀 Avg Kills</h4>
                <h2 id="global-kills">-</h2>
            </div>
        </div>

        <!-- chart section: match results bar chart and kill performance doughnut -->
        <div class="row mt-5">

            <div class="col-md-6 text-center">
                <h3>⚔️ MATCH RESULTS</h3>
                <canvas id="barChart"></canvas>
            </div>

            <div class="col-md-6 text-center">
                <h3>💀 KILL PERFORMANCE</h3>
                <canvas id="killsChart"></canvas>
            </div>

        </div>

    </div>

    <script>
        // redirect to login if no player session exists in localStorage
        const player = JSON.parse(localStorage.getItem("player"));

        if (!player) {
            console.warn("Viewing stats without login");
        }

        // fetches global stats from the API and populates the page
        // also triggers chart creation after data is received
        async function loadGlobalStats() {
            const res = await fetch("http://localhost:3000/global/stats");
            const data = await res.json();

            // populate summary stat cards
            document.getElementById("players").textContent = data.players || 0;
            document.getElementById("matches").textContent = data.matches || 0;
            document.getElementById("wins").textContent = data.wins || 0;
            document.getElementById("losses").textContent = data.losses || 0;

            // populate extra global stats
            document.getElementById("global-best").textContent = data.best_score || 0;
            document.getElementById("global-avg-time").textContent = Number(data.avg_duration || 0).toFixed(1);
            document.getElementById("hearts_bought").textContent = data.total_hearts_bought;

            // render charts with the fetched data
            createBarChart(data.wins || 0, data.losses || 0);
            createKillsChart(Number(data.avg_kills || 0));
        }

        // creates a pie chart showing win/loss ratio for a specific player
        // kept for potential future use even if not currently displayed
        function createWinLossChart(wins, losses) {
            const ctx = document.getElementById("winLossChart").getContext("2d");
            new Chart(ctx, {
                type: "pie",
                data: {
                    labels: ["Wins", "Losses"],
                    datasets: [{
                        data: [wins, losses],
                        backgroundColor: ["#28a745", "#dc3545"]
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            labels: { color: "white" }
                        }
                    }
                }
            });
        }

        // creates a bar chart comparing total global wins vs losses
        function createBarChart(wins, losses) {
            const ctx = document.getElementById("barChart").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Wins", "Losses"],
                    datasets: [{
                        label: "Matches",
                        data: [wins, losses],
                        backgroundColor: ["#28a745", "#dc3545"]
                    }]
                },
                options: {
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // creates a doughnut chart showing average kills per match vs remaining capacity
        // assumes a max of 10 kills as the reference total
        function createKillsChart(avgKills) {
            const ctx = document.getElementById("killsChart").getContext("2d");
            new Chart(ctx, {
                type: "doughnut",
                data: {
                    labels: ["Avg Kills", "Remaining"],
                    datasets: [{
                        data: [avgKills, 10 - avgKills],
                        backgroundColor: ["#ffc107", "#444"]
                    }]
                }
            });
        }
        
        // load and display all global stats on page load
        loadGlobalStats();
        
    </script>

</body>
</html>
